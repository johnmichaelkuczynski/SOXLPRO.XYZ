<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: transparent; }
  #toolbar { display: flex; gap: 8px; align-items: center; padding: 6px 2px; flex-wrap: wrap; }
  .tbtn {
    padding: 7px 18px; border: 1px solid #ccc; border-radius: 6px; cursor: pointer;
    font-size: 14px; background: #fff; color: #333; transition: all 0.15s;
    user-select: none;
  }
  .tbtn:hover { background: #f0f0f0; }
  .tbtn.active { background: #4A90D9; color: #fff; border-color: #4A90D9; }
  .tbtn.danger { color: #E53935; border-color: #E53935; }
  .tbtn.danger:hover { background: #E53935; color: #fff; }
  #status { font-size: 13px; color: #555; margin-left: 8px; }
  #chart { width: 100%; }
  #line-list { padding: 4px 2px; }
  .line-row { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 13px; color: #555; }
  .line-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .ldel { cursor: pointer; color: #E53935; border: none; background: none; font-size: 15px; padding: 2px 6px; }
  .ldel:hover { background: #fee; border-radius: 4px; }
</style>
</head>
<body>
<div id="toolbar">
  <button class="tbtn" id="drawBtn" onclick="toggleDraw()">&#9998; Draw Line</button>
  <button class="tbtn" onclick="resetView()">&#8634; Reset View</button>
  <button class="tbtn danger" id="clearBtn" onclick="clearAll()" style="display:none">&#128465; Clear All</button>
  <span id="status"></span>
</div>
<div id="chart"></div>
<div id="line-list"></div>

<script>
var COLORS = ['#888','#E53935','#43A047','#FB8C00','#8E24AA','#00ACC1','#6D4C41','#D81B60','#00897B','#FFB300'];
var chartDiv = document.getElementById('chart');
var drawMode = false;
var lines = [];
var chartData = null;
var rendered = false;
var knownShapeCount = 0;

function sendToStreamlit(type, data) {
  window.parent.postMessage(Object.assign({isStreamlitMessage: true, type: type}, data), "*");
}
function setComponentValue(value) {
  sendToStreamlit("streamlit:setComponentValue", {value: value});
}
function setFrameHeight(h) {
  sendToStreamlit("streamlit:setFrameHeight", {height: h});
}

window.addEventListener("message", function(event) {
  if (event.data.type === "streamlit:render") {
    var args = event.data.args;
    chartData = {
      dates: args.dates,
      prices: args.prices,
      future_end: args.future_end,
      chart_height: args.chart_height || 900
    };
    if (!rendered) {
      lines = (args.lines || []).slice();
      rendered = true;
    }
    renderChart();
    renderLineList();
    setTimeout(function() { setFrameHeight(document.body.scrollHeight + 20); }, 300);
  }
});

sendToStreamlit("streamlit:componentReady", {apiVersion: 1});

function toggleDraw() {
  drawMode = !drawMode;
  var btn = document.getElementById('drawBtn');
  btn.classList.toggle('active', drawMode);
  btn.textContent = drawMode ? '[ ] Stop Drawing' : '\u270E Draw Line';
  document.getElementById('status').textContent = drawMode
    ? 'Click and drag on the chart to draw a line'
    : 'Drag to zoom \u2022 Scroll to zoom \u2022 Shift+drag to pan';
  Plotly.relayout(chartDiv, {
    dragmode: drawMode ? 'drawline' : 'zoom',
    'newshape.line.color': '#888',
    'newshape.line.width': 2
  });
}

function resetView() {
  if (!chartData) return;
  var priceMin = Math.min.apply(null, chartData.prices.filter(function(p){return p>0;}));
  var priceMax = Math.max.apply(null, chartData.prices);
  var yPad = 0.3;
  Plotly.relayout(chartDiv, {
    'xaxis.range': [chartData.dates[0], chartData.future_end],
    'yaxis.range': [Math.log10(priceMin) - yPad, Math.log10(priceMax) + yPad]
  });
}

function clearAll() {
  lines = [];
  knownShapeCount = 0;
  renderChart();
  renderLineList();
  setComponentValue({action: "set_all", lines: lines});
}

function deleteLine(idx) {
  lines.splice(idx, 1);
  renderChart();
  renderLineList();
  setComponentValue({action: "set_all", lines: lines});
}

function msToDateStr(ms) {
  var d = new Date(ms);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

chartDiv.addEventListener('plotly_relayout', function(eventData) {
  if (!drawMode || !eventData) return;

  var hasShapeKey = false;
  for (var key in eventData) {
    if (key.indexOf('shapes') === 0) {
      hasShapeKey = true;
      break;
    }
  }
  if (!hasShapeKey) return;

  var shapes = (chartDiv.layout && chartDiv.layout.shapes) ? chartDiv.layout.shapes : [];
  if (shapes.length <= knownShapeCount) return;

  var lastShape = shapes[shapes.length - 1];
  if (!lastShape || lastShape.type !== 'line') return;

  var x0_ms = new Date(lastShape.x0).getTime();
  var x1_ms = new Date(lastShape.x1).getTime();
  var y0 = lastShape.y0;
  var y1 = lastShape.y1;

  if (chartDiv.layout.yaxis && chartDiv.layout.yaxis.type === 'log') {
    y0 = Math.pow(10, y0);
    y1 = Math.pow(10, y1);
  }

  if (Math.abs(x1_ms - x0_ms) < 86400000) return;
  if (y0 <= 0 || y1 <= 0) return;

  lines.push({
    x1_ms: x0_ms, y1: y0,
    x2_ms: x1_ms, y2: y1,
    x1: msToDateStr(x0_ms),
    x2: msToDateStr(x1_ms)
  });

  renderChart();
  renderLineList();
  setComponentValue({action: "set_all", lines: lines});
});

function renderChart() {
  if (!chartData) return;
  var traces = [];

  traces.push({
    x: chartData.dates, y: chartData.prices,
    mode: 'lines', name: 'SOXL',
    line: {color: '#1E88E5', width: 1.5},
    hovertemplate: '%{x|%Y-%m-%d}<br>$%{y:.2f}<extra></extra>'
  });

  var futureMs = new Date(chartData.future_end).getTime();

  for (var i = 0; i < lines.length; i++) {
    var ln = lines[i];
    var x1 = ln.x1_ms, y1 = ln.y1, x2 = ln.x2_ms, y2 = ln.y2;
    if (!y1 || !y2 || y1 <= 0 || y2 <= 0) continue;
    var dt = x2 - x1;
    if (dt === 0) continue;
    var logSlope = (Math.log10(y2) - Math.log10(y1)) / dt;
    var color = COLORS[i % COLORS.length];

    traces.push({
      x: [new Date(x1), new Date(x2)], y: [y1, y2],
      mode: 'lines+markers', showlegend: false,
      line: {color: color, width: 2.5},
      marker: {size: 6, color: color},
      hovertemplate: 'Line ' + (i+1) + '<br>%{x|%Y-%m-%d}<br>$%{y:.2f}<extra></extra>'
    });

    var fwdEnd = Math.max(x1, x2);
    var fwdY0 = fwdEnd === x2 ? y2 : y1;
    var fwdLogY = Math.log10(fwdY0) + logSlope * (futureMs - fwdEnd);
    if (fwdLogY > -3 && fwdLogY < 6) {
      traces.push({
        x: [new Date(fwdEnd), new Date(futureMs)],
        y: [fwdY0, Math.pow(10, fwdLogY)],
        mode: 'lines', showlegend: false,
        line: {color: color, width: 2, dash: 'dash'},
        hoverinfo: 'skip'
      });
    }

    var backEnd = Math.min(x1, x2);
    var backY0 = backEnd === x1 ? y1 : y2;
    var backMs = backEnd - 63072000000;
    var backLogY = Math.log10(backY0) + logSlope * (backMs - backEnd);
    if (backLogY > -3 && backLogY < 6) {
      traces.push({
        x: [new Date(backMs), new Date(backEnd)],
        y: [Math.pow(10, backLogY), backY0],
        mode: 'lines', showlegend: false,
        line: {color: color, width: 2, dash: 'dash'},
        hoverinfo: 'skip'
      });
    }
  }

  var priceMin = Math.min.apply(null, chartData.prices.filter(function(p){return p>0;}));
  var priceMax = Math.max.apply(null, chartData.prices);
  var yPad = 0.3;

  var layout = {
    yaxis: {
      type: 'log', tickprefix: '$', title: '',
      gridcolor: '#eee',
      range: [Math.log10(priceMin) - yPad, Math.log10(priceMax) + yPad],
      fixedrange: false
    },
    xaxis: {
      range: [chartData.dates[0], chartData.future_end],
      title: '', gridcolor: '#eee',
      dtick: 'M12', tickformat: '%Y',
      fixedrange: false
    },
    template: 'plotly_white',
    height: chartData.chart_height,
    margin: {l: 65, r: 20, t: 10, b: 40},
    showlegend: false,
    hovermode: 'x unified',
    dragmode: drawMode ? 'drawline' : 'zoom',
    newshape: {
      line: { color: '#888', width: 2 }
    },
    shapes: [],
    plot_bgcolor: 'white',
    paper_bgcolor: 'white',
    font: {color: '#333'}
  };

  var config = {
    scrollZoom: true,
    displayModeBar: true,
    modeBarButtonsToRemove: ['select2d', 'lasso2d', 'drawclosedpath', 'drawopenpath', 'drawcircle', 'drawrect', 'eraseshape']
  };

  Plotly.react(chartDiv, traces, layout, config);
  knownShapeCount = 0;
  document.getElementById('clearBtn').style.display = lines.length > 0 ? '' : 'none';

  if (!drawMode) {
    document.getElementById('status').textContent = 'Drag to zoom \u2022 Scroll to zoom \u2022 Shift+drag to pan';
  }
}

function renderLineList() {
  var el = document.getElementById('line-list');
  if (lines.length === 0) { el.innerHTML = ''; return; }
  var html = '';
  for (var i = 0; i < lines.length; i++) {
    var ln = lines[i];
    var color = COLORS[i % COLORS.length];
    html += '<div class="line-row">'
      + '<span class="line-dot" style="background:' + color + '"></span>'
      + '<span>Line ' + (i+1) + ': ' + ln.x1 + ' ($' + ln.y1.toFixed(2) + ') \u2192 ' + ln.x2 + ' ($' + ln.y2.toFixed(2) + ')</span>'
      + '<button class="ldel" onclick="deleteLine(' + i + ')">\u2715</button>'
      + '</div>';
  }
  el.innerHTML = html;
  setTimeout(function() { setFrameHeight(document.body.scrollHeight + 20); }, 50);
}
</script>
</body>
</html>
